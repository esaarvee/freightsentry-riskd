# Phase 1 rule catalogue — 14 rules.
#
# Source-of-truth thresholds (allow_max / block_min) live here; .env /
# pyproject must NOT shadow them. Every Name token in a `condition` MUST
# appear in app.rules.ALLOWED_CONTEXT_FIELDS — the loader fails fast at
# app lifespan startup if any field is unknown.
#
# Phase 1 does not implement Layer 2 (account-prior) per
# .ai/decisions.md § Scoring architecture — `maturity_sensitive` is
# preserved as a YAML field for forward compatibility but does NOT
# downweight rule contributions yet. Phase 2 wires the downweight.
#
# Phase 2+ expansion: ~80 additional rules per
# .ai/decisions.md § Rule catalogue target.

thresholds:
  allow_max: 0.60
  block_min: 0.80

rules:
  # =====================================================================
  # Layer 1 — hard-block short-circuit
  # =====================================================================

  - name: blacklisted_ip
    description: "IP in FireHOL Level 1 threat feed — confirmed attacker"
    condition: "ip_in_level1"
    weight: 1.0
    action: BLOCK

  - name: ip2p_threat_botnet_block
    description: "IP2Proxy PX11 flags this IP as a known botnet member"
    condition: "ip2p_threat_botnet"
    weight: 1.0
    action: BLOCK

  # =====================================================================
  # Layer 3 — signal noisy-OR contributions
  # =====================================================================

  - name: threat_intel_level2
    description: "IP in FireHOL Level 2 threat feed — moderate confidence"
    condition: "ip_in_level2"
    weight: 0.4

  - name: tor_exit
    description: "Booking from a Tor exit node"
    condition: "is_tor"
    weight: 0.5

  - name: vpn_high_value
    description: "VPN + high-value shipment"
    condition: "is_vpn AND shipment_value > 1000"
    weight: 0.3

  - name: customer_daily_volume_spike
    description: "Customer daily volume above threshold"
    condition: "velocity_user_daily > 20"
    weight: 0.4
    maturity_sensitive: true

  - name: ip_velocity_high_ui
    description: "Web-channel booking burst from one IP (>10/hour)"
    condition: "is_platform_booking AND velocity_ip_hourly > 10"
    weight: 0.3
    maturity_sensitive: true

  - name: ip_velocity_high_api
    description: "API-channel booking burst from one IP (>100/hour)"
    condition: "is_api_booking AND velocity_ip_hourly > 100"
    weight: 0.3
    maturity_sensitive: true

  - name: dummy_email_disposable_domain
    description: "Contact email uses a disposable / throwaway domain"
    condition: "is_email_disposable"
    weight: 0.3

  - name: dummy_phone_pattern
    description: "Contact phone matches a dummy pattern (1111111111, 1234567890, etc.)"
    condition: "is_phone_dummy_pattern"
    weight: 0.2

  - name: unknown_origin_address
    description: "Origin address not seen before for this established customer"
    condition: "NOT origin_address_familiar AND customer_observations >= 10"
    weight: 0.25
    maturity_sensitive: true

  - name: unknown_destination_address
    description: "Destination address not seen before for this established customer"
    condition: "NOT destination_address_familiar AND customer_observations >= 10"
    weight: 0.2
    maturity_sensitive: true

  - name: ip_fully_new_for_customer
    description: "IP, /24, and ASN all unfamiliar to this established customer"
    condition: "ip_fully_new AND customer_observations >= 10"
    weight: 0.35
    maturity_sensitive: true

  - name: unfamiliar_ip_country_for_origin
    description: "Origin paired with an unseen IP country for this established customer"
    condition: "NOT origin_ip_country_familiar AND customer_observations >= 10"
    weight: 0.3
    maturity_sensitive: true

  # =====================================================================
  # Phase 2C.1 — Trust-conditioned rules
  # Layer 2 in 2A.3 made trust_score meaningful at scoring time; these
  # rules fire when low trust + corroborating evidence compound.
  # =====================================================================

  - name: very_low_trust
    description: "Customer trust below 0.2 — broad reputational baseline"
    condition: "trust_score < 0.2"
    weight: 0.15
    maturity_sensitive: true

  - name: low_trust_high_value
    description: "Low-trust customer attempting a high-value booking"
    condition: "trust_score < 0.3 AND shipment_value > 1000"
    weight: 0.20
    maturity_sensitive: true

  - name: low_trust_vpn
    description: "Low-trust customer arriving from VPN infrastructure"
    condition: "trust_score < 0.3 AND is_vpn"
    weight: 0.20
    maturity_sensitive: true

  - name: very_low_trust_velocity
    description: "Very-low-trust customer with hourly booking burst (>3)"
    condition: "trust_score < 0.2 AND velocity_user_hourly > 3"
    weight: 0.35
    maturity_sensitive: true

  - name: threat_score_moderate
    description: "IP threat composite score above 0.5"
    condition: "ip_threat_score > 0.5"
    weight: 0.25

  - name: flags_with_value
    description: "Customer with >3 prior flags attempting a high-value booking"
    condition: "flagged_count > 3 AND shipment_value > 2000"
    weight: 0.40

  - name: vpn_known_user
    description: "Established customer (not new) booking from VPN"
    condition: "is_vpn AND NOT is_new_user"
    weight: 0.25

  # =====================================================================
  # Phase 2C.2 — Dormancy + customer lock-in (case-1 / case-2 ATO
  # primary detectors). Dormancy = silent customer suddenly active;
  # lock-in = customer's strong baseline (cloud+api or web-only)
  # being violated by the current booking's infrastructure shape.
  # =====================================================================

  - name: dormant_vpn
    description: "Dormant customer suddenly active over VPN"
    condition: "is_abnormally_dormant AND is_vpn"
    weight: 0.55

  - name: dormant_new_ip
    description: "Dormant customer suddenly active from a fully-new IP"
    condition: "is_abnormally_dormant AND ip_fully_new"
    weight: 0.35
    maturity_sensitive: true

  - name: ip_distance_dormant
    description: "Dormant customer reactivating from an IP >1000km from last booking"
    condition: "ip_distance_km > 1000 AND is_abnormally_dormant"
    weight: 0.40
    maturity_sensitive: true

  - name: cloud_api_customer_deviation_iptype
    description: "Established cloud+API customer booking from a non-cloud, non-datacenter IP"
    condition: "customer_locked_cloud_api AND is_api_booking AND NOT is_cloud_ip AND NOT is_datacenter_ip AND customer_observations >= 20"
    weight: 0.55

  - name: locked_customer_unfamiliar_ip
    description: "Established cloud+API customer arriving from a fully-new IP"
    condition: "customer_locked_cloud_api AND is_api_booking AND ip_fully_new AND customer_observations >= 20"
    weight: 0.45

  # =====================================================================
  # Phase 2C.3 — Residential ASN + IP-class diversity rules
  # Rules around residential-ASN abuse (proxy farms, distributed
  # bookings) and IP-class mismatches between the customer's typical
  # infrastructure and the current booking.
  # =====================================================================

  - name: residential_asn_high_velocity
    description: "Residential-ASN IP booking burst (>15 in an hour, tuned per verification §2.2)"
    condition: "is_residential_asn AND velocity_ip_hourly > 15"
    weight: 0.40
    maturity_sensitive: true

  - name: api_non_cloud_ip
    description: "API booking arriving from a non-cloud, non-datacenter IP"
    condition: "is_api_booking AND NOT is_cloud_ip AND NOT is_datacenter_ip"
    weight: 0.40

  - name: new_user_api_non_cloud
    description: "New user booking via API from a non-cloud, non-datacenter IP"
    condition: "is_new_user AND is_api_booking AND NOT is_cloud_ip AND NOT is_datacenter_ip"
    weight: 0.40

  - name: non_cloud_established_account
    description: "Established API account booking from non-cloud, non-datacenter IP"
    condition: "NOT is_cloud_ip AND NOT is_datacenter_ip AND NOT is_new_user AND is_api_booking"
    weight: 0.20

  - name: web_booking_from_cloud_ip
    description: "Web booking (UI channel) arriving from cloud or datacenter IP"
    condition: "is_platform_booking AND (is_cloud_ip OR is_datacenter_ip)"
    weight: 0.45

  - name: web_only_customer_using_api
    description: "Established web-only customer suddenly using the API channel"
    condition: "customer_locked_web_only AND is_api_booking AND customer_observations >= 20"
    weight: 0.50

  # =====================================================================
  # Phase 2C.4 — Recipient overlap rules
  # Cross-customer destination-hmac overlap detection. Tier-disjoint:
  # the lower-weight `_many_customers` rule fires in the 4-10 range,
  # the higher-weight `_very_many_customers` rule fires for >10. The
  # upper bound on the lower rule prevents both firing simultaneously
  # (avoiding noisy-OR compounding that the freight_risk catalogue
  # source did not intend).
  # =====================================================================

  - name: recipient_used_by_many_customers
    description: "Destination address shipped to by 4-10 distinct customers in this tenant (30d)"
    condition: "recipient_cross_customer_count > 3 AND recipient_cross_customer_count <= 10 AND customer_observations >= 10"
    weight: 0.40
    maturity_sensitive: true

  - name: recipient_used_by_very_many_customers
    description: "Destination address shipped to by >10 distinct customers in this tenant (30d) — likely fraud-ring drop point"
    condition: "recipient_cross_customer_count > 10"
    weight: 0.60

  # =====================================================================
  # Phase 2C.5 — Velocity (additional) + identity-novelty rules
  # Velocity-spike rules complementing Phase 1's basic customer_daily_
  # volume_spike, plus simple identity-novelty rules.
  # =====================================================================

  - name: velocity_spike_hourly_ui
    description: "Hourly velocity burst on the UI channel (>60 in an hour)"
    condition: "is_platform_booking AND velocity_user_hourly > 60"
    weight: 0.45
    maturity_sensitive: true

  - name: velocity_spike_hourly_api
    description: "Hourly velocity burst on the API channel (>500 in an hour)"
    condition: "is_api_booking AND velocity_user_hourly > 500"
    weight: 0.25
    maturity_sensitive: true

  - name: velocity_spike_daily_ui
    description: "Daily UI velocity spike (>300/day) on a relatively new account"
    condition: "is_platform_booking AND velocity_user_daily > 300 AND customer_observations < 30"
    weight: 0.35

  - name: velocity_spike_daily_api
    description: "Daily API velocity spike (>50/day) on a relatively new account (tuned per verification §2.2)"
    condition: "is_api_booking AND velocity_user_daily > 50 AND customer_observations < 30"
    weight: 0.25

  - name: ip_velocity_threat
    description: "IP velocity >5/day combined with threat-list membership"
    condition: "velocity_ip_daily > 5 AND ip_in_threat_list"
    weight: 0.35

  - name: user_velocity_vpn
    description: "Customer daily velocity >3 combined with VPN"
    condition: "velocity_user_daily > 3 AND is_vpn"
    weight: 0.30

  - name: user_velocity_new_user
    description: "New user posting >3 bookings per day"
    condition: "velocity_user_daily > 3 AND is_new_user"
    weight: 0.35

  - name: dummy_email_blocklisted
    description: "Contact email matches a known blocklist (high-confidence spam/abuse signal)"
    condition: "is_email_blocklisted"
    weight: 0.55

  - name: dummy_email_suspicious_pattern
    description: "Contact email matches a suspicious-pattern heuristic"
    condition: "is_email_suspicious_pattern"
    weight: 0.30

  - name: vpn_new_user
    description: "New user arriving via VPN"
    condition: "is_vpn AND is_new_user"
    weight: 0.40

  - name: high_value_new_user
    description: "Brand-new user attempting a high-value (>5000) shipment"
    condition: "shipment_value > 5000 AND is_new_user"
    weight: 0.35

  # =====================================================================
  # Phase 2C.6 — Value-anomaly + geographic + threat-intel composites
  #
  # Triage notes (per PLAN_PHASE_2C.md):
  # - threat_intel_level1 (freight_risk 29) NOT ported — Phase 1's
  #   blacklisted_ip BLOCK rule already covers ip_in_level1 at Layer 1.
  #   Adding it as a Layer 3 contribution would be redundant (Layer 1
  #   short-circuit means Layer 3 never runs when BLOCK fires).
  # - outside_allowed_country (freight_risk 181) DEFERRED to Phase 4 —
  #   the condition references ip_outside_allowed_country which depends
  #   on tenant-level country_allowlist config (Phase 4 scope).
  # =====================================================================

  # Value-anomaly (6 rules)

  - name: extreme_value
    description: "Shipment value > 3σ above customer's baseline mean (>=10 observations)"
    condition: "value_zscore > 3.0 AND customer_observations >= 10"
    weight: 0.40
    maturity_sensitive: true

  - name: above_normal_value
    description: "Shipment value 2-3σ above customer's baseline mean"
    condition: "value_zscore > 2.0 AND value_zscore <= 3.0 AND customer_observations >= 10"
    weight: 0.15
    maturity_sensitive: true

  - name: above_normal_value_vpn
    description: "2σ above baseline AND on VPN — anomaly + infrastructure mismatch"
    condition: "value_zscore > 2.0 AND is_vpn"
    weight: 0.25

  - name: absolute_high_value
    description: "Absolute high-value shipment (>10000) regardless of customer baseline"
    condition: "shipment_value > 10000"
    weight: 0.20

  - name: threat_intel_high_value
    description: "FireHOL-listed IP combined with high-value (>2000) shipment"
    condition: "ip_in_threat_list AND shipment_value > 2000"
    weight: 0.30

  - name: ip2p_threat_high_value
    description: "IP2Proxy threat tag combined with high-value (>2000) shipment"
    condition: "ip2p_threat_any AND shipment_value > 2000"
    weight: 0.40

  # Geographic (5 rules)

  - name: ip_intercontinental_jump
    description: "IP distance >5000km from customer's last booking — implausible same-day travel"
    condition: "ip_distance_km > 5000"
    weight: 0.35

  - name: ip_long_distance_new_ip
    description: "IP distance >2000km from last booking + IP is new for this customer"
    condition: "ip_distance_km > 2000 AND is_new_ip"
    weight: 0.25

  - name: ip_country_change
    description: "IP country differs from last booking + IP is new for this customer"
    condition: "ip_country_changed AND is_new_ip"
    weight: 0.25

  - name: api_country_change_unfamiliar
    description: "API booking + new IP + IP country changed — high-stakes API ATO indicator"
    condition: "is_api_booking AND ip_country_changed AND is_new_ip"
    weight: 0.55

  - name: impossible_travel_geo
    description: "Same-day booking from >500km away from last known location"
    condition: "impossible_travel"
    weight: 0.65

  # Threat-intel composites (excluding redundant Layer-1 duplicates) (6 rules)
  # Note: ip2p_threat_scanner_signal and ip2p_threat_spam_signal carry the
  # `_signal` suffix to avoid collision with the homonymous Context boolean
  # fields ip2p_threat_scanner / ip2p_threat_spam used inside the conditions.

  - name: threat_level2_vpn
    description: "FireHOL Level 2 IP combined with VPN"
    condition: "ip_in_level2 AND is_vpn"
    weight: 0.20

  - name: ip2p_threat_scanner_signal
    description: "IP2Proxy threat tag indicates port scanner activity"
    condition: "ip2p_threat_scanner"
    weight: 0.50

  - name: ip2p_threat_spam_signal
    description: "IP2Proxy threat tag indicates spam-infrastructure IP"
    condition: "ip2p_threat_spam"
    weight: 0.35

  - name: ip2p_threat_new_user
    description: "Any IP2Proxy threat tag + brand-new user"
    condition: "ip2p_threat_any AND is_new_user"
    weight: 0.40

  - name: ip2p_threat_api
    description: "Any IP2Proxy threat tag + API booking channel"
    condition: "ip2p_threat_any AND is_api_booking"
    weight: 0.45

  - name: open_proxy
    description: "IP flagged as open proxy (NOT VPN and NOT Tor — distinct proxy class)"
    condition: "is_proxy AND NOT is_vpn AND NOT is_tor"
    weight: 0.30

  # =====================================================================
  # Phase 2C.7 — IP-familiarity tier + closing pieces
  # The 3 IP-familiarity-tier rules from freight_risk plus 2 compound
  # rules whose conditions re-use existing fields without adaptation.
  #
  # Triaged from this commit per plan (reason in PLAN_PHASE_2C.md):
  # - unknown_email_for_customer, unknown_phone_for_customer: would
  #   require adapted condition (proxy fields). Defer to Phase 3+
  #   when is_new_email / is_new_phone fields land.
  # - user_ip_rotation_elevated, user_ip_rotation_high: would require
  #   semantic mismatch (customer_distinct_ips_30d vs
  #   user_unique_non_cloud_ips_daily — different metrics). Defer
  #   until a proper distinct-non-cloud-IP counter lands.
  # =====================================================================

  - name: ip_family_familiar_cloud
    description: "Cloud IP from a familiar /24 — known infrastructure, low signal"
    condition: "ip_family_familiar AND is_cloud_ip AND customer_observations >= 10"
    weight: 0.05
    maturity_sensitive: true

  - name: ip_family_familiar_residential
    description: "Residential IP from a familiar /24 — higher signal than cloud"
    condition: "ip_family_familiar AND NOT is_cloud_ip AND customer_observations >= 10"
    weight: 0.15
    maturity_sensitive: true

  - name: ip_new_known_asn_rule
    description: "New IP and /24 but from a known ASN for this established customer"
    condition: "ip_new_known_asn AND customer_observations >= 20"
    weight: 0.30
    maturity_sensitive: true

  - name: value_novelty_compound
    description: "Above-baseline value combined with fully-new IP for an established customer"
    condition: "value_zscore > 1.5 AND ip_fully_new AND customer_observations >= 20"
    weight: 0.35
    maturity_sensitive: true

  - name: locked_customer_new_ip_family
    description: "Locked cloud+API customer arriving from a known-ASN but new IP — narrower than locked_customer_unfamiliar_ip"
    condition: "customer_locked_cloud_api AND is_api_booking AND ip_new_known_asn AND customer_observations >= 20"
    weight: 0.30

  # =====================================================================
  # Modification rules (Phase 3A.7) — 8 rules for the
  # POST /api/v1/shipments/modification/evaluate endpoint. Weights chosen
  # by operator judgment per .ai/decisions.md "Modification rule weight
  # rationale (Phase 3A)" subsection — calibration deferred to Phase 6
  # staging replay.
  #
  # Booking-path dormancy: build_context populates modification_type as
  # the "none" sentinel (see app/context.py BOOKING_PATH_MODIFICATION_
  # DEFAULTS and tests/unit/conftest.py base_ctx). "none" matches none
  # of the enum literals these rules condition on, so the rules evaluate
  # to False on every booking. The DSL evaluator requires every
  # referenced field to be populated at evaluation time (raises
  # NameError otherwise), so the booking-path defaults are structural —
  # NOT optional. test_modification_rules_dormant_under_booking_path_
  # defaults pins this invariant.
  # =====================================================================

  - name: modification_within_30_min_value_increase
    description: "Value modification within 30 minutes of booking with >20% magnitude — value-jacking pattern"
    condition: 'modification_type == "value" AND modification_time_since_booking == "within_30_min" AND modification_magnitude > 0.2'
    weight: 0.65

  - name: modification_destination_change_pre_pickup
    description: "Destination change to an unfamiliar address within 24h of booking — re-routing fraud"
    condition: 'modification_type == "destination" AND modification_time_since_booking == "within_24_hours" AND modification_direction == "unfamiliar"'
    weight: 0.55
    maturity_sensitive: true

  - name: modification_high_velocity_1h
    description: "More than 3 modifications by this customer in the last hour — campaign signal"
    condition: "modification_velocity_1h > 3"
    weight: 0.70

  - name: modification_high_velocity_24h
    description: "More than 10 modifications by this customer in the last 24 hours — sustained volume"
    condition: "modification_velocity_24h > 10"
    weight: 0.45
    maturity_sensitive: true

  - name: modification_low_trust_customer
    description: "Low-trust customer changing destination compounds risk"
    condition: 'trust_score < 0.3 AND modification_type == "destination"'
    weight: 0.55

  - name: modification_dormant_customer
    description: "Modification on destination from an abnormally dormant customer — ATO pattern"
    condition: 'is_abnormally_dormant AND modification_type == "destination"'
    weight: 0.60
    maturity_sensitive: true

  - name: modification_recipient_change_to_unfamiliar
    description: "Recipient change to a destination not previously shipped to by this customer"
    condition: 'modification_type == "recipient" AND modification_direction == "unfamiliar"'
    weight: 0.40
    maturity_sensitive: true

  - name: modification_destination_change_residential_asn
    description: "Destination change combined with residential ASN signal"
    condition: 'modification_type == "destination" AND is_residential_asn'
    weight: 0.35
    maturity_sensitive: true

  # =====================================================================
  # Previously-rejected rules (Phase 3B.5) — 4 rules consuming the
  # email/phone/origin/ip_previously_rejected Context fields populated
  # in 3B.4. Weights ported from freight_risk's catalogue (verified
  # during 3B planning, §6 of verification). All maturity-sensitive:
  # a young / thin-baseline customer with one prior rejection still
  # contributes to score under Layer 2 with appropriate downweighting.
  # =====================================================================

  - name: email_previously_rejected_for_customer
    description: "Email matches a previously-rejected contact for this customer"
    condition: "email_previously_rejected"
    weight: 0.60
    maturity_sensitive: true

  - name: phone_previously_rejected_for_customer
    description: "Phone matches a previously-rejected contact for this customer"
    condition: "phone_previously_rejected"
    weight: 0.60
    maturity_sensitive: true

  - name: origin_previously_rejected_for_customer
    description: "Origin address was previously rejected by a reviewer for this customer"
    condition: "origin_previously_rejected"
    weight: 0.70
    maturity_sensitive: true

  - name: ip_previously_rejected_for_customer
    description: "Source IP was previously rejected by a reviewer for this customer"
    condition: "ip_previously_rejected"
    weight: 0.70
    maturity_sensitive: true
