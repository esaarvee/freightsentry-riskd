default_language_version:
  python: python3

# Hooks run on `git commit` as non-bypassable enforcement.
# Subagents MUST NOT mark a task done until `pre-commit run --all-files` passes locally.
# Bypass via `git commit --no-verify` is allowed only inside declared-break commits;
# see CLAUDE.md "Pre-commit enforcement" for the rules.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        files: ^app/
        args: [--strict]
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings
          - fastapi
          - httpx
          - structlog
          - types-PyYAML

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests, fast)
        entry: pytest tests/unit/ -x --no-header -q --asyncio-mode=auto
        language: system
        pass_filenames: false
        # Run only when Python source or unit test files change. Integration
        # and security tests are too slow for the per-commit hook; they run
        # in the 6-step cycle's Validate step and in CI.
        files: ^(app/|tests/unit/).*\.py$
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        # rules.yaml is parsed by app/rules.py at startup; catch malformed
        # YAML here so it never reaches the rule loader. --unsafe relaxes
        # constructor instantiation so CloudFormation intrinsic tags (!Sub,
        # !Ref, !GetAtt, !GetAZs, !Cidr, !Select) under infra/cloudformation/
        # don't trip PyYAML's strict loader; syntax validation is preserved.
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        # Phase 6C.1 raised the cap from 500KB to 8000KB to accommodate
        # the replay-validation corpus NDJSON files committed under
        # scripts/replay/data/. The approved corpus is ~6MB (10K
        # records); case-2 ~300KB (500 records); case-3 ~62KB (95-
        # record full census). Corpus is a one-shot artifact for 6C
        # measurement, not recurring growth.
        args: [--maxkb=8000]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]
        # Prevent direct commits to main; feature branches and worktrees only.
