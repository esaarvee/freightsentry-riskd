default_language_version:
  python: python3

# Hooks run on `git commit` as non-bypassable enforcement.
# Subagents MUST NOT mark a task done until `pre-commit run --all-files` passes locally.
# Bypass via `git commit --no-verify` is allowed only inside declared-break commits;
# see CLAUDE.md "Pre-commit enforcement" for the rules.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        files: ^app/
        args: [--strict]
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings
          - fastapi
          - asyncpg-stubs
          - types-PyYAML

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests, fast)
        entry: pytest tests/unit/ -x --no-header -q --asyncio-mode=auto
        language: system
        pass_filenames: false
        # Run only when Python source or unit test files change. Integration
        # and security tests are too slow for the per-commit hook; they run
        # in the 6-step cycle's Validate step and in CI.
        files: ^(app/|tests/unit/).*\.py$
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        # rules.yaml is parsed by app/rules.py at startup; catch malformed
        # YAML here so it never reaches the rule loader.
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]
        # Prevent direct commits to main; feature branches and worktrees only.
