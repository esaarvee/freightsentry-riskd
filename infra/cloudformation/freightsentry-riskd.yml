AWSTemplateFormatVersion: '2010-09-09'

Description: >-
  freightsentry-riskd IaC stack. Additive to the manual runbook
  (docs/aws-deploy-runbook.md). Region is determined by the
  `aws cloudformation deploy --region` flag (AWS::Region pseudo-parameter
  is referenced throughout; no Region parameter exists). ECS service +
  task-definition stay manual (see infra/cloudformation/README.md and
  plan D16). Pattern B-lite enrichment refresh module is a launch
  blocker shipped in a separate pass (see README banner).

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Environment
        Parameters:
          - Environment
          - LogRetentionDays
      - Label:
          default: Networking
        Parameters:
          - VpcCidr
      - Label:
          default: Database
        Parameters:
          - DbInstanceClass
          - DbAllocatedStorage
          - DbMaxAllocatedStorage
          - DbMultiAz
          - DbBackupRetentionDays
          - DbDeletionProtection
      - Label:
          default: Load balancer
        Parameters:
          - AcmCertificateArn
      - Label:
          default: IAM and GitHub OIDC
        Parameters:
          - GitHubOidcProviderArn
          - GitHubRepo
          - GitHubOidcRefPattern
    ParameterLabels:
      Environment:
        default: Deployment environment (test or production)
      LogRetentionDays:
        default: CloudWatch log group retention (days)
      VpcCidr:
        default: VPC CIDR block (must not overlap any existing VPC in the target region)
      DbInstanceClass:
        default: RDS instance class
      DbAllocatedStorage:
        default: Initial DB storage (GiB)
      DbMaxAllocatedStorage:
        default: Storage autoscaling ceiling (GiB)
      DbMultiAz:
        default: Multi-AZ standby
      DbBackupRetentionDays:
        default: Automated backup retention (days)
      DbDeletionProtection:
        default: Deletion protection
      AcmCertificateArn:
        default: ACM certificate ARN (required; HTTPS listener)
      GitHubOidcProviderArn:
        default: GitHub OIDC provider ARN (account-level; from platform-app)
      GitHubRepo:
        default: GitHub org/repo allowed to assume DeployRole (exact; no wildcards)
      GitHubOidcRefPattern:
        default: Git ref pattern the deploy workflow must run from (tag gate)

Parameters:

  Environment:
    Type: String
    AllowedValues:
      - test
      - production
    Description: >-
      Deployment environment. Determines env-suffix on account-global
      resource names (IAM roles in C6). Region is set by the deploy
      command's --region flag and resolved via AWS::Region.

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: >-
      CloudWatch log retention. Test envs typically override to 7 in
      params/test.json; production defaults to 30.

  VpcCidr:
    Type: String
    Default: 10.1.0.0/16
    AllowedPattern: '^(10|172|192)\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})/(1[6-9]|2[0-4])$'
    ConstraintDescription: Must be an RFC1918 private CIDR with /16-/24 mask.
    Description: >-
      VPC CIDR. MUST NOT overlap any existing VPC in the target region —
      operator runs the pre-deploy verification command in README before
      first deploy and overrides per env if needed. Fallbacks documented:
      10.2.0.0/16, 172.20.0.0/16. Subnet CIDRs are derived via !Cidr
      (no separate subnet-CIDR parameters).

  DbInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues:
      - db.t4g.micro
      - db.t4g.small
      - db.t4g.medium
      - db.t4g.large
      - db.m6g.large
      - db.m6g.xlarge
    Description: >-
      RDS instance class. db.t4g.micro is the pre-launch single-tenant
      default; scale up as throughput requires. Larger classes available
      via parameter override; no template change needed.

  DbAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 1000
    Description: Initial provisioned storage in GiB (gp3). Autoscales up to DbMaxAllocatedStorage.

  DbMaxAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 16384
    Description: Storage autoscaling ceiling in GiB. Must be >= DbAllocatedStorage.

  DbMultiAz:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Multi-AZ standby. Default false at pre-launch single-tenant scale.
      Production should flip to true once traffic justifies the ~2x cost.

  DbBackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: Automated backup retention. Production default 7; test overrides to 1.

  DbDeletionProtection:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Deletion protection. Production default true; test overrides to false
      so test stacks can be torn down without manual unprotect.

  AcmCertificateArn:
    Type: String
    AllowedPattern: '^arn:aws:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-f0-9-]+$'
    ConstraintDescription: Must be a fully-qualified ACM certificate ARN.
    Description: >-
      ACM certificate ARN for the ALB HTTPS listener. Operator issues the
      cert out-of-band (DNS or email validation) in the target region
      BEFORE first deploy. ACM certs are region-scoped; can't reuse across
      regions. No default — required parameter.

  GitHubOidcProviderArn:
    Type: String
    AllowedPattern: '^arn:aws:iam::[0-9]{12}:oidc-provider/token\.actions\.githubusercontent\.com$'
    ConstraintDescription: Must be the account-level GitHub Actions OIDC provider ARN.
    Description: >-
      GitHub Actions OIDC provider ARN — already exists in the AWS account
      from the platform-app deployment (D5). Operator runs
      `aws iam list-open-id-connect-providers` to obtain. NOT created by
      this template (would conflict with platform-app).

  GitHubRepo:
    Type: String
    Default: 'esaarvee/freightsentry-riskd'
    AllowedPattern: '^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'
    ConstraintDescription: >-
      Must be an exact 'org/repo' slug — no wildcards. Wildcards in the
      org or repo would let look-alike repositories assume DeployRole.
    Description: >-
      Exact GitHub org/repo whose workflows may assume DeployRole. Combined
      with the deploying Environment to form the OIDC `sub` claim
      `repo:<org/repo>:environment:<Environment>`. Secrets are managed via
      GitHub Environments, so the workflow job runs under an environment and
      the `sub` claim is environment-scoped (not ref-scoped). Override only
      when forking to a different repository.

  GitHubOidcRefPattern:
    Type: String
    Default: 'refs/tags/v*'
    Description: >-
      Git ref the deploy workflow must run from, matched against the OIDC
      `ref` claim (StringLike). Defaults to the deploy.yml tag-push trigger
      (`v*` semver tags). This is a second, independent gate on top of the
      environment-scoped `sub`: the caller must be the exact repo, running
      in the matching Environment, AND triggered from a `v*` tag.

Resources:

  # ---------------------------------------------------------------
  # C2 — VPC + networking
  # 4 /20 subnets sliced from the /16 VPC CIDR via !Cidr:
  #   index 0 → PublicSubnet1   (e.g. 10.1.0.0/20)
  #   index 1 → PublicSubnet2   (e.g. 10.1.16.0/20)
  #   index 2 → PrivateSubnet1  (e.g. 10.1.32.0/20)
  #   index 3 → PrivateSubnet2  (e.g. 10.1.48.0/20)
  # Single NAT in PublicSubnet1 (cost trade-off; cross-AZ private-
  # subnet egress goes through this NAT). Acceptable at pre-launch
  # single-tenant scale; multi-AZ NAT is a scale-up knob.
  # ---------------------------------------------------------------

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-vpc-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-igw-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 12]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-public-1-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 12]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-public-2-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 4, 12]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-private-1-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 4, 12]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-private-2-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-nat-eip-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-nat-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-public-rt-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-private-rt-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------
  # C3 — Security groups
  # Cross-app isolation boundary: by NOT including platform-app's SGs
  # as sources, riskd's RDS is reachable only from riskd's ECS tasks.
  # Platform-app workloads have their own SGs and cannot ingress here.
  # Egress is left default (allow-all) on every SG:
  #   - ALB: needs to talk to target ECS tasks (8000/tcp).
  #   - ECS task: needs ECR pulls, Secrets Manager, RDS, CloudWatch
  #     Logs, and NAT-bound enrichment upstreams (raw.githubusercontent
  #     .com / MaxMind / IP2Location / Microsoft / Cloudflare consumed
  #     by app/enrichment_refresh.py — see .ai/enrichment.md § Refresh
  #     module).
  #   - RDS: AWS docs recommend NOT restricting egress on DB instances
  #     (backups + Performance Insights + other AWS services need it).
  # ---------------------------------------------------------------

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'freightsentry-riskd-alb-${Environment}'
      GroupDescription: ALB ingress (443 + 80) from the internet; redirects 80 to 443 in C5.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirected to HTTPS at the listener)
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-alb-sg-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  EcsTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'freightsentry-riskd-ecs-${Environment}'
      GroupDescription: ECS task ingress on 8000/tcp from ALB only; default egress for ECR/Secrets/RDS/NAT.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: App port from ALB SG only
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-ecs-sg-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'freightsentry-riskd-rds-${Environment}'
      GroupDescription: RDS ingress on 5432/tcp from riskd ECS tasks only; default egress per AWS RDS guidance.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsTaskSecurityGroup
          Description: PostgreSQL from riskd ECS tasks only (cross-app isolation boundary)
      Tags:
        - Key: Name
          Value: !Sub 'freightsentry-riskd-rds-sg-${Environment}'
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # C4 — RDS PostgreSQL
  # Master credentials are CFN-generated into DbMasterSecret at
  # freightsentry-riskd/DB_MASTER (D18 naming; uppercase per F5).
  # Runtime app uses a separate riskd_app_login DSN at
  # freightsentry-riskd/DATABASE_URL (populated by operator after the
  # initial alembic runtime-roles migration; PBL D2 makes subsequent
  # rotations automatic via the migrate task).
  # The runtime TaskExecutionRole (C6) does NOT grant access to
  # DB_MASTER. Per PBL D3, the dedicated MigrationTaskExecutionRole
  # (C6) is the only automated principal allowed to read DB_MASTER,
  # and only on the deploy path. Operator-run alembic (manual
  # recovery, ad-hoc inspection) still uses operator AWS creds.
  # DeletionPolicy: Snapshot + UpdateReplacePolicy: Snapshot protect
  # data against accidental delete or replacement-triggering changes.
  # RecoveryWindowInDays omitted on DbMasterSecret per STATUS.md
  # 2026-06-08 (not a valid Properties field; API default = 30 days).
  # ---------------------------------------------------------------

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: riskd RDS subnet group (private subnets across 2 AZs)
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  DbParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: riskd PostgreSQL 16 parameter group (defaults; tunables added per scale-up plan)
      Family: postgres16
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  DbMasterSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: freightsentry-riskd/DB_MASTER
      Description: >-
        RDS master credentials (username: riskd). Read by the
        deploy-path MigrationTaskExecutionRole (PBL D3) and by
        operator-run alembic (manual recovery). NOT accessible to the
        runtime TaskExecutionRole — D18 invariant preserved. Host /
        port / dbname populated by DbSecretAttachment after DbInstance.
      GenerateSecretString:
        SecretStringTemplate: '{"username":"riskd"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: freightsentry-riskd
      Engine: postgres
      EngineVersion: '16.9'
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      MaxAllocatedStorage: !Ref DbMaxAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      DBName: riskd
      MasterUsername: !Sub '{{resolve:secretsmanager:${DbMasterSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DbMasterSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DbSubnetGroup
      DBParameterGroupName: !Ref DbParameterGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      PubliclyAccessible: false
      MultiAZ: !Ref DbMultiAz
      BackupRetentionPeriod: !Ref DbBackupRetentionDays
      DeletionProtection: !Ref DbDeletionProtection
      EnablePerformanceInsights: false
      # AutoMinorVersionUpgrade false because EngineVersion is pinned to a
      # specific minor (16.9). If AWS auto-bumped minor in the maintenance
      # window, the next `aws cloudformation deploy` would revert the engine
      # back to 16.9 — fighting AWS and risking downtime. Operator opts into
      # minor upgrades via parameter override + intentional stack-update.
      AutoMinorVersionUpgrade: false
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  DbSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DbMasterSecret
      TargetId: !Ref DbInstance
      TargetType: AWS::RDS::DBInstance

  # ---------------------------------------------------------------
  # C5 — ALB + target group + HTTPS listener
  # Internet-facing ALB in public subnets; HTTPS:443 → TargetGroup
  # on port 8000 against ECS task IPs (Fargate target type).
  # HTTP:80 redirects to HTTPS. SslPolicy TLS 1.3 / 1.2 hybrid is
  # the current AWS-recommended policy. ALB and TargetGroup names
  # omit env suffix (region-scoped resources per D13; production
  # ca-central-1 and test us-east-2 cannot collide).
  # ---------------------------------------------------------------

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: freightsentry-riskd-alb
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: freightsentry-riskd-tg
      Protocol: HTTP
      Port: 8000
      TargetType: ip
      VpcId: !Ref Vpc
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health/
      HealthCheckPort: '8000'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            Host: '#{host}'
            Path: '/#{path}'
            Query: '#{query}'
            StatusCode: HTTP_301

  # ---------------------------------------------------------------
  # C6 — IAM roles
  # Account-global resources; env-suffixed names per D13. Region
  # coexistence works because IAM is account-scoped, not regional —
  # one role per env, used by deploys in either region.
  #
  # D18 enforcement: TaskExecutionRole grants secretsmanager:GetSecretValue
  # on an EXPLICIT 4-ARN list, NOT the wildcard `freightsentry-riskd/*`
  # the existing manual policy used. DB_MASTER is intentionally excluded
  # — the runtime app must not be able to read superuser credentials.
  #
  # PBL D3 (deploy-path-only D18 reversal): alembic migrations now run
  # automatically per deploy via a dedicated MigrationTaskExecutionRole
  # (below). That role is the ONLY automated principal with DB_MASTER
  # access; the runtime TaskExecutionRole stays clean. Operator-run
  # alembic (manual recovery, ad-hoc inspection) still uses the
  # operator's own AWS credentials.
  # ---------------------------------------------------------------

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'freightsentry-riskd-task-exec-${Environment}'
      Description: ECS task execution role - pull image, write logs, fetch 4 runtime secrets (NOT DB_MASTER per D18).
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: task-execution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuthorization
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRImagePull
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/freightsentry-riskd'
              - Sid: CloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/freightsentry-riskd:*'
              - Sid: SecretsManagerReadExplicitFourArns
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseUrlSecret
                  - !Ref HmacSecret
                  - !Ref MaxmindSecret
                  - !Ref Ip2proxySecret
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'freightsentry-riskd-task-${Environment}'
      Description: ECS task role - empty policy. App makes zero AWS API calls; metrics emit via EMF on stdout.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  # PBL D3: dedicated execution role for the migrate task definition.
  # This is the ONLY automated-deploy IAM principal allowed to read
  # DbMasterSecret (and DatabaseUrlSecret, the source of the
  # riskd_app_login password the migration provisions). The runtime
  # TaskExecutionRole above is intentionally NOT extended — the D18
  # invariant "runtime role cannot read master credentials" stays
  # intact; we accept the D18 reversal scoped strictly to this role
  # and only on the deploy path. alembic itself makes zero AWS API
  # calls so the task role can stay the existing empty TaskRole.
  MigrationTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'freightsentry-riskd-migrate-exec-${Environment}'
      Description: ECS execution role for the alembic migrate task - pulls image, writes logs, reads DB_MASTER + DATABASE_URL (PBL D3 - deploy-path-only D18 reversal).
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: migrate-execution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuthorization
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRImagePull
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/freightsentry-riskd'
              - Sid: CloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/freightsentry-riskd:*'
              - Sid: SecretsManagerReadMigrationSecrets
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DbMasterSecret
                  - !Ref DatabaseUrlSecret
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  # Dedicated task role for the one-off tenant-onboarding task
  # (infra/ecs-task-definition-onboard.json). It is the ONLY task role
  # in the stack with an AWS write permission: scripts/tenant_onboard.py
  # --token-secret-id writes the freshly issued tenant API token to
  # Secrets Manager so the plaintext never lands in CloudWatch Logs. Kept
  # SEPARATE from the zero-permission runtime TaskRole above so the
  # public request-serving container holds no Secrets-Manager write
  # capability — the grant is confined to the non-internet-facing,
  # operator-launched onboarding task. Scoped to the per-tenant token
  # namespace freightsentry-riskd/tenants/* only.
  OnboardTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'freightsentry-riskd-onboard-task-${Environment}'
      Description: ECS task role for the one-off tenant-onboarding task - writes the issued tenant API token to Secrets Manager (freightsentry-riskd/tenants/* only); kept separate from the zero-permission runtime TaskRole.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: onboard-token-write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: TenantTokenSecretWrite
                Effect: Allow
                Action:
                  - secretsmanager:PutSecretValue
                  - secretsmanager:CreateSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:freightsentry-riskd/tenants/*'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'freightsentry-riskd-deploy-${Environment}'
      Description: GitHub Actions OIDC-assumed role for tag-push deploys (.github/workflows/deploy.yml).
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              # Exact `sub` match (no wildcards): the token must come from the
              # named repo running under the GitHub Environment matching the
              # CFN Environment param. Secrets moved to GitHub Environments, so
              # the `sub` is environment-scoped — the ref/tag is gated below via
              # the separate `ref` claim.
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubRepo}:environment:${Environment}'
              # Second, independent gate: workflow must run from a v* tag.
              StringLike:
                token.actions.githubusercontent.com:ref: !Ref GitHubOidcRefPattern
      Policies:
        - PolicyName: deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuthorization
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/freightsentry-riskd'
              - Sid: ECSTaskDefinitionRegister
                Effect: Allow
                Action: ecs:RegisterTaskDefinition
                Resource: '*'
              - Sid: ECSServiceUpdate
                Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                Resource:
                  - !Sub 'arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/freightsentry-riskd-cluster-${Environment}/*'
                  - !Sub 'arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task/freightsentry-riskd-cluster-${Environment}/*'
                  - !Sub 'arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/freightsentry-riskd-cluster-${Environment}'
              # PBL D3: run the migrate task def as a one-shot Fargate task
              # ahead of update-service. Scoped to the migrate family so the
              # deploy role cannot launch arbitrary task definitions.
              - Sid: ECSRunMigrateTask
                Effect: Allow
                Action: ecs:RunTask
                Resource: !Sub 'arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/freightsentry-riskd-migrate:*'
              - Sid: IAMPassRoleForEcs
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt TaskRole.Arn
                  # PBL D3: migrate task def attaches MigrationTaskExecutionRole
                  # as its executionRoleArn; iam:PassRole is required for the
                  # deploy role to register / run that task definition.
                  - !GetAtt MigrationTaskExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # C7 — ECS cluster (cluster ONLY per D16)
  # Service and TaskDefinition stay in infra/ecs-task-definition.json
  # + the manual runbook procedure so the existing deploy workflow's
  # `aws ecs register-task-definition` / `aws ecs update-service`
  # ownership of task-def revisions doesn't conflict with CFN.
  # See C8 README §"Post-deploy operator steps" for the manual
  # service-creation procedure.
  # ---------------------------------------------------------------

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'freightsentry-riskd-cluster-${Environment}'
      CapacityProviders:
        - FARGATE
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # C1 resources (ECR, log group, secret containers)
  # ---------------------------------------------------------------

  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: freightsentry-riskd
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep 10 most recent images; expire older",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: /ecs/freightsentry-riskd
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: freightsentry-riskd/DATABASE_URL
      Description: >-
        Runtime DSN (riskd_app_login role). Populated post-deploy by
        operator after the alembic runtime-roles migration creates the role.
      SecretString: '{"placeholder":"populate via aws secretsmanager put-secret-value"}'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  HmacSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: freightsentry-riskd/HMAC_SECRET
      Description: >-
        HMAC signing key. Populated post-deploy via
        `openssl rand -hex 32 | aws secretsmanager put-secret-value`.
      SecretString: '{"placeholder":"populate via aws secretsmanager put-secret-value"}'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  MaxmindSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: freightsentry-riskd/MAXMIND_LICENSE_KEY
      Description: >-
        MaxMind GeoLite2 license key. Populated post-deploy. Consumed
        by the Pattern B-lite enrichment refresh module
        (app/enrichment_refresh.py).
      SecretString: '{"placeholder":"populate via aws secretsmanager put-secret-value"}'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

  Ip2proxySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: freightsentry-riskd/IP2PROXY_DOWNLOAD_TOKEN
      Description: >-
        IP2Proxy LITE PX11 download token. Populated post-deploy.
        Required by Pattern B-lite enrichment refresh module.
      SecretString: '{"placeholder":"populate via aws secretsmanager put-secret-value"}'
      Tags:
        - Key: Project
          Value: freightsentry-riskd
        - Key: Environment
          Value: !Ref Environment

Outputs:

  EcrRepositoryUri:
    Description: ECR repository URI for `docker push` and task-def IMAGE_URI substitution.
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}'

  LogGroupName:
    Description: CloudWatch log group for ECS task logs.
    Value: !Ref LogGroup

  DatabaseUrlSecretArn:
    Description: ARN of the runtime DATABASE_URL secret (populate post-deploy).
    Value: !Ref DatabaseUrlSecret

  HmacSecretArn:
    Description: ARN of the HMAC_SECRET secret.
    Value: !Ref HmacSecret

  MaxmindSecretArn:
    Description: ARN of the MAXMIND_LICENSE_KEY secret.
    Value: !Ref MaxmindSecret

  Ip2proxySecretArn:
    Description: ARN of the IP2PROXY_DOWNLOAD_TOKEN secret.
    Value: !Ref Ip2proxySecret

  VpcId:
    Description: VPC ID for downstream resource attachment.
    Value: !Ref Vpc

  PublicSubnetIds:
    Description: Comma-separated public subnet IDs (for ALB attachment in C5).
    Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]

  PrivateSubnetIds:
    Description: Comma-separated private subnet IDs (for ECS tasks in C7 and DB subnet group in C4).
    Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]

  DbEndpointAddress:
    Description: RDS endpoint hostname (operator constructs ALEMBIC_DATABASE_URL with this).
    Value: !GetAtt DbInstance.Endpoint.Address

  DbEndpointPort:
    Description: RDS endpoint port.
    Value: !GetAtt DbInstance.Endpoint.Port

  DbMasterSecretArn:
    Description: >-
      ARN of the RDS master credentials secret. Operator fetches with
      own AWS creds for alembic migrations; NOT readable by runtime task.
    Value: !Ref DbMasterSecret

  AlbDnsName:
    Description: ALB DNS name. Operator points the domain CNAME / Route 53 alias here.
    Value: !GetAtt LoadBalancer.DNSName

  AlbCanonicalHostedZoneId:
    Description: ALB hosted zone ID. Used for Route 53 ALIAS records.
    Value: !GetAtt LoadBalancer.CanonicalHostedZoneID

  TargetGroupArn:
    Description: >-
      Target group ARN. Operator references this in the manual
      `aws ecs create-service --load-balancers` step (D16; ECS service
      stays outside CFN).
    Value: !Ref TargetGroup

  TaskExecutionRoleArn:
    Description: ECS task execution role ARN (referenced in infra/ecs-task-definition.json post-deploy substitution).
    Value: !GetAtt TaskExecutionRole.Arn

  MigrationTaskExecutionRoleArn:
    Description: >-
      Execution role ARN for the alembic migrate task definition
      (PBL D3). Substituted into infra/ecs-task-definition-migrate.json
      by the deploy workflow as ${MIGRATION_TASK_EXEC_ROLE_ARN}.
    Value: !GetAtt MigrationTaskExecutionRole.Arn

  TaskRoleArn:
    Description: ECS task role ARN (empty policy; referenced in task definition).
    Value: !GetAtt TaskRole.Arn

  OnboardTaskRoleArn:
    Description: >-
      Task role ARN for the one-off tenant-onboarding task
      (infra/ecs-task-definition-onboard.json). Grants
      secretsmanager:PutSecretValue/CreateSecret on
      freightsentry-riskd/tenants/* only. Operator substitutes this as
      the taskRoleArn when registering the onboard task definition.
    Value: !GetAtt OnboardTaskRole.Arn

  DeployRoleArn:
    Description: >-
      GitHub Actions deploy role ARN. Operator sets this as the
      `AWS_ROLE_TO_ASSUME` GitHub secret per env.
    Value: !GetAtt DeployRole.Arn

  EcsClusterName:
    Description: >-
      ECS cluster name. Operator uses for the manual `aws ecs create-service`
      step (per D16; service stays outside CFN to avoid conflict with the
      deploy workflow's register-task-definition / update-service ownership).
    Value: !Ref EcsCluster
